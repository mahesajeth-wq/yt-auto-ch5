<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Hyperframes B-roll Render Template (Landscape)</title>
  <!-- Modern Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&family=Inter:wght@300;400;700&family=Playfair+Display:ital,wght@0,600;1,400&family=Share+Tech+Mono&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- GSAP CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
      font-family: 'Inter', sans-serif;
    }

    #viewport {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #broll-container {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #broll-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform-origin: center center;
    }

    /* --- Overlays --- */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    /* --- Science Niche: Glitch Grid Telemetry --- */
    #science-grid-overlay {
      display: none;
      opacity: 0.15;
      background-size: 40px 40px;
      background-image: 
        linear-gradient(to right, #00f0ff 1px, transparent 1px),
        linear-gradient(to bottom, #00f0ff 1px, transparent 1px);
    }
    .niche-science #science-grid-overlay {
      display: block;
    }
    #scanner-line {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(180deg, rgba(0,240,255,0) 0%, rgba(0,240,255,0.8) 50%, rgba(0,240,255,0) 100%);
      box-shadow: 0 0 12px rgba(0,240,255,0.6);
      display: none;
      z-index: 6;
    }
    .niche-science #scanner-line {
      display: block;
    }
    #science-hud {
      position: absolute;
      top: 20px;
      left: 20px;
      width: calc(100% - 40px);
      height: calc(100% - 40px);
      border: 1px solid rgba(0, 240, 255, 0.25);
      pointer-events: none;
      z-index: 6;
      display: none;
    }
    .niche-science #science-hud {
      display: block;
    }
    #science-hud::before {
      content: "SCAN ACTIVE... UNIT_04";
      position: absolute;
      top: 10px;
      left: 15px;
      color: #00f0ff;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
    }
    #science-hud-coords {
      position: absolute;
      bottom: 10px;
      right: 15px;
      color: #00f0ff;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
    }

    /* --- Nature Niche: Mist & Silhouette --- */
    #nature-mist-overlay {
      display: none;
      opacity: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 50%, rgba(255,255,255,0.2) 100%);
      mix-blend-mode: screen;
    }
    .niche-nature #nature-mist-overlay {
      display: block;
    }
    #nature-vignette {
      display: none;
      background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.85) 100%);
    }
    .niche-nature #nature-vignette {
      display: block;
    }
    #nature-silhouette-mask {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: 4;
      display: none;
    }
    .niche-nature #nature-silhouette-mask {
      display: block;
    }

    /* --- History Niche: Scrapbook circle --- */
    .niche-history #broll-image {
      filter: sepia(0.6) contrast(1.1) brightness(0.9);
    }
    #history-vignette {
      display: none;
      background: radial-gradient(circle, transparent 50%, rgba(35,20,5,0.8) 100%);
    }
    .niche-history #history-vignette {
      display: block;
    }
    #history-pen-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 6;
      display: none;
    }
    .niche-history #history-pen-svg {
      display: block;
    }

    /* --- Engineering Niche: CAD Draft --- */
    #engineering-grid-overlay {
      display: none;
      opacity: 0.25;
      background-size: 50px 50px;
      background-image: 
        linear-gradient(to right, rgba(255,255,255,0.25) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.25) 1px, transparent 1px);
      background-color: #0b1a30;
      z-index: 2;
    }
    .niche-engineering #engineering-grid-overlay {
      display: block;
    }
    #engineering-cad-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 6;
      display: none;
    }
    .niche-engineering #engineering-cad-svg {
      display: block;
    }

    /* --- Business Niche: Candlestick Split --- */
    #business-split-container {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      display: none;
      z-index: 6;
      pointer-events: none;
    }
    .niche-business #business-split-container {
      display: block;
    }
    #business-chart-panel {
      position: absolute;
      right: 0;
      top: 0;
      width: 40%;
      height: 100%;
      background-color: rgba(10, 15, 12, 0.9);
      border-left: 1px solid #d4af37;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }
    #business-chart-svg {
      width: 100%;
      height: 60%;
    }
    .candlestick {
      fill: #22c55e;
      stroke: #22c55e;
      stroke-width: 2;
    }
    .candlestick.down {
      fill: #ef4444;
      stroke: #ef4444;
    }
    .wick {
      stroke-width: 2;
    }
    .wick.up {
      stroke: #22c55e;
    }
    .wick.down {
      stroke: #ef4444;
    }

    /* --- Caption / Hook Text Box --- */
    #caption-box {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 85%;
      padding: 18px 24px;
      border-radius: 6px;
      text-align: center;
      z-index: 10;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      display: none;
    }

    .caption-pos-bottom {
      bottom: 80px;
      background-color: rgba(0,0,0,0.75);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
    }

    .niche-science #caption-box {
      top: 60px;
      bottom: auto;
      background-color: rgba(0, 15, 30, 0.85);
      border: 1px solid #00f0ff;
      font-family: 'Share Tech Mono', monospace;
      color: #00f0ff;
    }

    .niche-history #caption-box {
      bottom: 100px;
      background-color: #f2ebd9;
      border: 2px solid #5c4033;
      font-family: 'Courier Prime', monospace;
      color: #2b1d0c;
    }

    .niche-engineering #caption-box {
      bottom: 70px;
      background-color: rgba(10, 20, 40, 0.9);
      border-left: 5px solid #fff;
      font-family: 'Space Grotesk', sans-serif;
      color: #fff;
      text-align: left;
    }

    .niche-business #caption-box {
      bottom: 90px;
      background-color: rgba(15,15,15,0.95);
      border: 1px solid #d4af37;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
    }

    #caption-text {
      font-size: 20px;
      font-weight: 500;
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <div id="viewport"
       data-composition-id="viewport"
       data-width="1920"
       data-height="1080"
       data-start="0"
       data-fps="30"
       data-duration="6"
       data-composition-variables='{"imageUrl": "", "duration": 6, "niche": "general", "caption": ""}'>
       
    <div id="broll-container">
      <img id="broll-image" src="" alt="B-roll image">
      
      <!-- Niche Overlays -->
      <!-- Science -->
      <div id="science-grid-overlay" class="overlay"></div>
      <div id="scanner-line"></div>
      <div id="science-hud">
        <div id="science-hud-coords">SYS: OK // COORDS: 0.0000, 0.0000</div>
      </div>

      <!-- Nature -->
      <div id="nature-vignette" class="overlay"></div>
      <div id="nature-mist-overlay" class="overlay"></div>
      <svg id="nature-silhouette-mask" viewBox="0 0 1920 1080" preserveAspectRatio="none">
        <defs>
          <mask id="nature-mask">
            <rect width="1920" height="1080" fill="white" />
            <!-- Centered mysterious circular lens path -->
            <circle id="mask-circle" cx="960" cy="540" r="400" fill="black" />
          </mask>
        </defs>
        <!-- Overlay card that masks the image -->
        <rect width="1920" height="1080" fill="#051008" mask="url(#nature-mask)" opacity="0.9" />
      </svg>

      <!-- History -->
      <div id="history-vignette" class="overlay"></div>
      <svg id="history-pen-svg" viewBox="0 0 1920 1080">
        <!-- Red pen highlight circle on focal point -->
        <ellipse id="marker-circle" cx="960" cy="540" rx="200" ry="120" 
                 fill="none" stroke="#ef4444" stroke-width="4" stroke-dasharray="1000" stroke-dashoffset="1000" />
      </svg>

      <!-- Engineering -->
      <div id="engineering-grid-overlay" class="overlay"></div>
      <svg id="engineering-cad-svg" viewBox="0 0 1920 1080">
        <!-- Structural wireframe paths -->
        <path class="cad-vector-path" d="M100,100 L1820,100 L1820,980 L100,980 Z" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-dasharray="800" stroke-dashoffset="800" />
        <path class="cad-vector-path" d="M100,100 L1820,980" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="800" stroke-dashoffset="800" />
        <path class="cad-vector-path" d="M100,980 L1820,100" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="800" stroke-dashoffset="800" />
      </svg>

      <!-- Business -->
      <div id="business-split-container">
        <div id="business-chart-panel">
          <h4 style="color:#d4af37; margin-bottom:20px; font-family:'Space Grotesk'; font-size:16px;">MARKET PERFORMANCE</h4>
          <svg id="business-chart-svg" viewBox="0 0 200 200">
            <!-- Candlestick chart elements -->
            <!-- Step 1 -->
            <line class="wick up" x1="30" y1="40" x2="30" y2="160" />
            <rect class="candlestick" x="20" y="60" width="20" height="80" />
            <!-- Step 2 -->
            <line class="wick up" x1="80" y1="20" x2="80" y2="140" />
            <rect class="candlestick" x="70" y="30" width="20" height="70" />
            <!-- Step 3 -->
            <line class="wick down" x1="130" y1="60" x2="130" y2="180" />
            <rect class="candlestick down" x="120" y="80" width="20" height="80" />
            <!-- Step 4 -->
            <line class="wick up" x1="180" y1="10" x2="180" y2="110" />
            <rect class="candlestick" x="170" y="20" width="20" height="60" />
          </svg>
        </div>
      </div>

      <!-- Caption Box -->
      <div id="caption-box" class="caption-pos-bottom">
        <div id="caption-text"></div>
      </div>
    </div>
    
  </div>

  <script>
    // Signal readiness gate for Hyperframes
    window.__playerReady = false;

    // Grab Hyperframes variables
    const hf = window.__hyperframes || {
      getVariables: () => ({
        imageUrl: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=1920",
        duration: 6,
        niche: "science",
        caption: "A mysterious technology scan active."
      })
    };

    const vars = hf.getVariables();
    const niche = vars.niche || "general";
    const duration = parseFloat(vars.duration) || 6.0;

    // Apply niche CSS class to body
    document.body.className = "niche-" + niche;

    // Load B-roll Image and hook to __playerReady
    const imgEl = document.getElementById("broll-image");
    
    imgEl.onload = () => {
      window.__playerReady = true;
    };
    imgEl.onerror = () => {
      window.__playerReady = true; // prevent freeze
    };

    if (vars.imageUrl) {
      imgEl.src = vars.imageUrl;
    } else {
      window.__playerReady = true;
    }

    // Set up caption
    const captionBox = document.getElementById("caption-box");
    const captionText = document.getElementById("caption-text");
    if (vars.caption) {
      captionText.innerText = vars.caption;
      captionBox.style.display = "block";
    }

    // --- Build GSAP Animation Timeline (paused for seek-based rendering) ---
    const tl = gsap.timeline({ paused: true, defaults: { ease: "sine.inOut" } });

    // Register timeline with Hyperframes
    window.__timelines = window.__timelines || {};
    window.__timelines["viewport"] = tl;

    // 1. Ken Burns Effect (Zoom & Pan)
    let scaleStart = 1.0;
    let scaleEnd = 1.15;
    let xEnd = "2%";
    let yEnd = "1%";

    if (niche === "science") {
      scaleStart = 1.0;
      scaleEnd = 1.12;
      xEnd = "0%";
      yEnd = "0%";
    } else if (niche === "nature") {
      scaleStart = 1.05;
      scaleEnd = 1.25;
      xEnd = "-3%";
      yEnd = "-2%";
    } else if (niche === "history") {
      scaleStart = 1.0;
      scaleEnd = 1.2;
      xEnd = "3%";
      yEnd = "2%";
    } else if (niche === "engineering") {
      scaleStart = 1.0;
      scaleEnd = 1.1;
      xEnd = "-1%";
      yEnd = "1%";
    }

    // Apply Ken Burns zoom/pan over the full duration
    tl.fromTo(imgEl, 
      { scale: scaleStart, x: "0%", y: "0%" },
      { scale: scaleEnd, x: xEnd, y: yEnd, duration: duration, ease: "linear" },
      0
    );

    // 2. Niche Specific Animations
    if (niche === "science") {
      const line = document.getElementById("scanner-line");
      const vpHeight = document.getElementById("viewport").offsetHeight || 1080;
      // Scanner line loop via transform-y (sub-pixel, smooth)
      tl.fromTo(line,
        { y: 0 },
        { y: vpHeight - 4, duration: duration / 2, ease: "sine.inOut", repeat: 1, yoyo: true },
        0
      );

      // Coordinate rolling display
      const coords = { lat: 0, lng: 0 };
      tl.to(coords, {
        lat: 37.7749,
        lng: -122.4194,
        duration: duration - 1,
        ease: "power1.out",
        onUpdate: () => {
          document.getElementById("science-hud-coords").innerText = `SYS: OK // COORDS: ${coords.lat.toFixed(4)}, ${coords.lng.toFixed(4)}`;
        }
      }, 0.2);
      
    } else if (niche === "nature") {
      // Mystery mask expansion
      tl.fromTo("#mask-circle",
        { attr: { r: 350 } },
        { attr: { r: 600 }, duration: duration, ease: "sine.out" },
        0
      );
      // Volumetric mist drift
      tl.fromTo("#nature-mist-overlay",
        { opacity: 0.1, xPercent: -5 },
        { opacity: 0.35, xPercent: 5, duration: duration, ease: "linear" },
        0
      );

    } else if (niche === "history") {
      // Polaroid sliding-in from left
      tl.fromTo("#broll-container",
        { xPercent: -10, rotation: -4 },
        { xPercent: 0, rotation: 0, duration: 1.5, ease: "power2.out" },
        0
      );
      // Draw pen highlight circle
      tl.fromTo("#marker-circle",
        { strokeDashoffset: 1000 },
        { strokeDashoffset: 0, duration: 1.8, ease: "power1.inOut" },
        1.2
      );

    } else if (niche === "engineering") {
      // Blueprint grid transition: start with dark blue grid, fade grid/reveal picture
      tl.fromTo("#engineering-grid-overlay",
        { opacity: 0.8 },
        { opacity: 0.2, duration: 2.0, ease: "sine.inOut" },
        1.0
      );
      // Draw structural CAD lines
      tl.fromTo(".cad-vector-path",
        { strokeDashoffset: 800 },
        { strokeDashoffset: 0, duration: 2.2, ease: "power2.out", stagger: 0.2 },
        0
      );

    } else if (niche === "business") {
      // Split panel slider entry
      tl.fromTo("#business-chart-panel",
        { xPercent: 100 },
        { xPercent: 0, duration: 1.2, ease: "power3.out" },
        0
      );
      // Draw candlesticks
      tl.fromTo(".candlestick",
        { scaleY: 0 },
        { scaleY: 1, duration: 0.8, stagger: 0.08, transformOrigin: "bottom", ease: "back.out(1.2)" },
        0.8
      );
      tl.fromTo(".wick",
        { scaleY: 0 },
        { scaleY: 1, duration: 0.8, stagger: 0.08, transformOrigin: "center", ease: "power2.out" },
        0.8
      );
    }

    // 3. Caption entry animation
    if (vars.caption) {
      tl.fromTo(captionBox,
        { opacity: 0, y: 20 },
        { opacity: 1, y: 0, duration: 0.8, ease: "power2.out" },
        0.3
      );
    }
  </script>
</body>
</html>
